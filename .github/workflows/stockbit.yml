name: Stockbit Fetcher
on:
  schedule:
    - cron: '0 11 * * 1-5'
  workflow_dispatch:
    inputs:
      bearer:
        description: 'Bearer token baru (opsional)'
        required: false

env:
  RUN_BROKSUM: "true"
  RUN_PROFILE: "false"

jobs:
  check-bearer:
    runs-on: ubuntu-latest
    permissions:
      secrets: write
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Update Bearer Token
        if: ${{ inputs.bearer != '' }}
        run: |
          echo "::add-mask::${{ inputs.bearer }}"
          echo "${{ inputs.bearer }}" | gh secret set BEARER_TOKEN
          echo "BEARER_TOKEN=${{ inputs.bearer }}" >> $GITHUB_ENV
      - name: Check Bearer Token
        run: |
          python3 check_bearer.py || (
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="⚠️ Bearer Token EXPIRED! Kirim /bearer <token_baru> ke bot." && exit 1
          )
      - name: Notify Bearer OK
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="🟢 Bearer token aman! Mulai fetch 9 batch paralel..."

  fetch:
    needs: check-bearer
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      BATCH_INDEX: ${{ matrix.batch }}
      TOTAL_BATCHES: "9"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run Broksum (batch ${{ matrix.batch }})
        if: env.RUN_BROKSUM == 'true'
        run: python stockbit_broksum.py
      - name: Run Profile (batch ${{ matrix.batch }})
        if: env.RUN_PROFILE == 'true'
        run: python stockbit_profile.py

  notify-done:
    needs: fetch
    runs-on: ubuntu-latest
    if: success()
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - name: Notify Success
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="✅ Selesai! Semua 9 batch berhasil diupdate ke Google Sheets."
