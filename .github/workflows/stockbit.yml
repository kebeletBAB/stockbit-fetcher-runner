name: Stockbit Fetcher

# ====================================================================
# V2 (9 Jul 2026): job "fetch" (stockbit_broksum.py) dan "fetch-broksum-db"
# (stockbit_broksum_db.py) DIGABUNG jadi satu job "fetch-unified" yang
# panggil stockbit_unified_daily.py -- satu fetch per ticker per hari,
# push ke "10 Fungsi" + BROKSUM_DB (flat) + BROKSUM_DB_*_Broker (flatlog)
# sekaligus, plus hitung broker-count-5D (hari bursa aktual) buat Edge #3.
#
# PENTING -- "10 Fungsi" tetap jalan TANPA SYARAT (sama seperti dulu) meski
# BROKSUM_DB (flat)/broker-registry belum lengkap untuk suatu universe;
# lihat CHANGELOG V1.4 di stockbit_unified_daily.py.
#
# stockbit_ohlc_db.py (Yahoo Finance -> OHLC_DB) sumber datanya beda total
# (yfinance, bukan Stockbit API) jadi TIDAK ikut dikonsolidasi ke
# stockbit_unified_daily.py -- tapi karena TIDAK butuh BEARER_TOKEN atau
# gate wait-for-data (bukan Stockbit), job-nya bisa jalan PARALEL, independen,
# sejak awal workflow (lihat job "fetch-ohlc" di bawah) -- biasanya selesai
# lebih cepat dari fetch-unified karena yfinance lebih ringan dari API Stockbit.
# ====================================================================

on:
  schedule:
    - cron: '0 5 * * 1-5'
  workflow_dispatch:
    inputs:
      bearer:
        description: 'Bearer token baru (opsional)'
        required: false
      force_run:
        description: 'Force run meski libur/weekend (true/false)'
        required: false
        default: 'false'
      run_backfill:
        description: 'Jalankan backfill GAS dari backfill_queue.csv (true/false)'
        required: false
        default: 'false'
      run_broksum_db_backfill:
        description: 'Jalankan backfill Broksum_DB 600 hari (true/false)'
        required: false
        default: 'false'

env:
  FORCE_RUN: ${{ inputs.force_run || 'false' }}
  RUN_BACKFILL: ${{ inputs.run_backfill || 'false' }}

jobs:
  # ============================================================
  # JOB 1: CEK BEARER TOKEN
  # ============================================================
  check-bearer:
    runs-on: ubuntu-latest
    outputs:
      bearer: ${{ steps.set-bearer.outputs.bearer }}
    env:
      BEARER_TOKEN: ${{ inputs.bearer || secrets.BEARER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      FORCE_RUN: ${{ inputs.force_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Update Bearer Token
        if: ${{ inputs.bearer != '' }}
        run: |
          echo "::add-mask::${{ inputs.bearer }}"
          echo "${{ inputs.bearer }}" | gh secret set BEARER_TOKEN
      - name: Set bearer output
        id: set-bearer
        run: |
          echo "::add-mask::${BEARER_TOKEN}"
          echo "bearer=${BEARER_TOKEN}" >> $GITHUB_OUTPUT
      - name: Debug curl
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "authorization: Bearer ${BEARER_TOKEN}" \
            -H "origin: https://stockbit.com" \
            -H "x-platform: web" \
            -H "user-agent: Mozilla/5.0" \
            "https://exodus.stockbit.com/marketdetectors/BBCA?transaction_type=TRANSACTION_TYPE_NET&market_board=MARKET_BOARD_REGULER&investor_type=INVESTOR_TYPE_ALL&limit=1&period=BROKER_SUMMARY_PERIOD_LATEST")
          echo "Curl status: $STATUS"
      - name: Check Bearer Token
        run: |
          python3 check_bearer.py || (
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d chat_id="${TELEGRAM_CHAT_ID}" \
              -d text="Bearer Token EXPIRED! Kirim /bearer <token_baru> ke bot." && exit 1
          )
      - name: Notify Bearer OK
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Bearer token aman! Mulai fetch unified 9 batch paralel..."

  # ============================================================
  # JOB 1.5: GATE - TUNGGU DATA SETTLE (SEKALI SAJA UNTUK SEMUA BATCH)
  # tetap pakai stockbit_broksum.py --wait-only (cek generik "data sudah
  # settle belum", tidak terkait script mana yang fetch datanya)
  # ============================================================
  wait-for-data:
    needs: check-bearer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Tunggu data settle (1x cek untuk semua batch)
        env:
          BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
          FORCE_RUN: ${{ inputs.force_run || 'false' }}
          PYTHONUNBUFFERED: "1"
        # -u = unbuffered, supaya print() muncul real-time di log GitHub
        # Actions, bukan telat/nunggu buffer flush (lihat CHANGELOG FIX
        # di wait_for_today_data(), stockbit_broksum.py)
        run: python -u stockbit_broksum.py --wait-only

  # ============================================================
  # JOB 2: FETCH UNIFIED -> "10 Fungsi" + BROKSUM_DB (flat) +
  # BROKSUM_DB_*_Broker (flatlog), 9 batch paralel, SATU fetch per ticker.
  # ============================================================
  fetch-unified:
    needs: [check-bearer, wait-for-data]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6, 7, 8]
      fail-fast: false
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      BATCH_INDEX: ${{ matrix.batch }}
      TOTAL_BATCHES: "9"
      FORCE_RUN: ${{ inputs.force_run || 'false' }}
      MODE_DAILY: "1"
      MODE_WEEKLY: "1"
      MODE_MONTHLY: "1"
      CREDENTIALS: "credentials.json"
      CREDENTIALS_IDX: "credentials_idx.json"
      CREDENTIALS_EIPO: "credentials_eipo.json"
      CREDENTIALS_BFR2016: "credentials_bfr2016.json"
      BROKSUM_DB_IDX: ${{ secrets.BROKSUM_DB_IDX }}
      BROKSUM_DB_EIPO: ${{ secrets.BROKSUM_DB_EIPO }}
      BROKSUM_DB_BFR2016: ${{ secrets.BROKSUM_DB_BFR2016 }}
      BROKSUM_DB_BROKER_IDX: ${{ secrets.BROKSUM_DB_BROKER_IDX }}
      BROKSUM_DB_BROKER_EIPO: ${{ secrets.BROKSUM_DB_BROKER_EIPO }}
      BROKSUM_DB_BROKER_BFR2016: ${{ secrets.BROKSUM_DB_BROKER_BFR2016 }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests gspread
      - name: Setup Google credentials (flat aggregate, shared)
        run: echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
      - name: Setup Google credentials (broker-level, per universe)
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS_IDX }}" | base64 -d > credentials_idx.json
          echo "${{ secrets.GOOGLE_CREDENTIALS_EIPO }}" | base64 -d > credentials_eipo.json
          echo "${{ secrets.GOOGLE_CREDENTIALS_BFR2016 }}" | base64 -d > credentials_bfr2016.json
      - name: Run Unified Daily (batch ${{ matrix.batch }})
        run: python stockbit_unified_daily.py
      - name: Upload error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-batch-${{ matrix.batch }}
          path: error_log_*.csv
          if-no-files-found: ignore

  # ============================================================
  # JOB 2.5: FETCH OHLC (Yahoo Finance -> OHLC_DB) -- TIDAK butuh
  # BEARER_TOKEN atau gate wait-for-data (bukan Stockbit API), jadi jalan
  # independen paralel sejak awal workflow. 3 batch cukup (yfinance jauh
  # lebih ringan/cepat daripada fetch Stockbit, delay antar-saham 0.5s
  # vs 1.5s dan cuma perlu 1 request per ticker per hari).
  # ============================================================
  fetch-ohlc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [0, 1, 2]
      fail-fast: false
    env:
      OHLC_DB_ID: ${{ secrets.OHLC_DB_ID }}
      CREDENTIALS: "credentials.json"
      MODE: "daily"
      BATCH_INDEX: ${{ matrix.batch }}
      TOTAL_BATCHES: "3"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install yfinance gspread pandas
      - name: Setup Google credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
      - name: Run OHLC DB daily (batch ${{ matrix.batch }})
        run: python stockbit_ohlc_db.py

  # ============================================================
  # JOB 3: BACKFILL GAS (existing, no change)
  # ============================================================
  backfill:
    needs: check-bearer
    runs-on: ubuntu-latest
    if: ${{ inputs.run_backfill == 'true' }}
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests
      - name: Run Backfill
        run: python stockbit_backfill.py
      - name: Upload error logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: error-log-backfill
          path: error_log_backfill_*.csv
          if-no-files-found: ignore

  # ============================================================
  # JOB 4: BACKFILL BROKSUM_DB 600 HARI (manual trigger only, existing,
  # no change -- ini backfill flat aggregate lama, terpisah dari backfill
  # broker-level yang dijalankan manual pakai stockbit_broker_flatlog_db.py)
  # ============================================================
  backfill-broksum-db:
    needs: check-bearer
    runs-on: ubuntu-latest
    if: ${{ inputs.run_broksum_db_backfill == 'true' }}
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      BROKSUM_DB_IDX: ${{ secrets.BROKSUM_DB_IDX }}
      BROKSUM_DB_EIPO: ${{ secrets.BROKSUM_DB_EIPO }}
      BROKSUM_DB_BFR2016: ${{ secrets.BROKSUM_DB_BFR2016 }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      MODE: "backfill"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests gspread
      - name: Setup Google credentials
        run: echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
      - name: Run Broksum DB Backfill 600 hari
        run: python stockbit_broksum_db.py
      - name: Notify Done
        if: always()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Broksum DB backfill 600 hari selesai!"

  # ============================================================
  # JOB 5: NOTIFY DONE + RETRY (error log format baru: ticker,target,
  # universe,ts,error -- lihat CHANGELOG V1.3 stockbit_unified_daily.py)
  # ============================================================
  notify-done:
    needs: [check-bearer, wait-for-data, fetch-unified, fetch-ohlc, backfill, backfill-broksum-db]
    runs-on: ubuntu-latest
    if: always()
    env:
      BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      CREDENTIALS: "credentials.json"
      CREDENTIALS_IDX: "credentials_idx.json"
      CREDENTIALS_EIPO: "credentials_eipo.json"
      CREDENTIALS_BFR2016: "credentials_bfr2016.json"
      BROKSUM_DB_IDX: ${{ secrets.BROKSUM_DB_IDX }}
      BROKSUM_DB_EIPO: ${{ secrets.BROKSUM_DB_EIPO }}
      BROKSUM_DB_BFR2016: ${{ secrets.BROKSUM_DB_BFR2016 }}
      BROKSUM_DB_BROKER_IDX: ${{ secrets.BROKSUM_DB_BROKER_IDX }}
      BROKSUM_DB_BROKER_EIPO: ${{ secrets.BROKSUM_DB_BROKER_EIPO }}
      BROKSUM_DB_BROKER_BFR2016: ${{ secrets.BROKSUM_DB_BROKER_BFR2016 }}
      MODE_WEEKLY: "0"
      MODE_MONTHLY: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install requests gspread
      - name: Download all error logs
        uses: actions/download-artifact@v4
        with:
          pattern: error-log-batch-*
          merge-multiple: true
          path: error_logs/
        continue-on-error: true
      - name: Gabung error logs & retry
        run: |
          python3 << 'PYEOF'
          import csv, os, glob

          all_errors = []
          seen = set()
          for f in glob.glob("error_logs/error_log_*.csv"):
              with open(f, newline="") as fp:
                  for row in csv.DictReader(fp):
                      key = (row["ticker"], row.get("target", ""))
                      if key not in seen:
                          seen.add(key)
                          all_errors.append(row)

          if not all_errors:
              print("Tidak ada error, skip retry")
              exit(0)

          with open("retry_queue.csv", "w", newline="") as f:
              w = csv.writer(f)
              for e in all_errors:
                  w.writerow([e["ticker"], e.get("target", "")])

          print(f"Retry queue: {len(all_errors)} ticker")
          PYEOF
      - name: Setup Google credentials untuk retry
        if: always()
        run: |
          echo "${{ secrets.GOOGLE_CREDENTIALS }}" | base64 -d > credentials.json
          echo "${{ secrets.GOOGLE_CREDENTIALS_IDX }}" | base64 -d > credentials_idx.json
          echo "${{ secrets.GOOGLE_CREDENTIALS_EIPO }}" | base64 -d > credentials_eipo.json
          echo "${{ secrets.GOOGLE_CREDENTIALS_BFR2016 }}" | base64 -d > credentials_bfr2016.json
      - name: Run Retry
        run: |
          if [ -f retry_queue.csv ]; then
            CSV_FILE=retry_queue.csv python stockbit_unified_daily.py
          fi
      - name: Notify Done
        run: |
          RETRY=$([ -f retry_queue.csv ] && wc -l < retry_queue.csv || echo 0)
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="Selesai! Retry ${RETRY} ticker timeout."
