name: Refresh Stockbit Bearer

on:
  schedule:
    - cron: '30 7 * * 1-5'
  workflow_dispatch:
    inputs:
      account:
        description: 'Akun bearer yang dipakai'
        required: false
        default: 'primary'
        type: choice
        options:
          - primary
          - secondary
      trigger_fetch:
        description: 'Trigger workflow fetch setelah refresh sukses (true/false)'
        required: false
        default: 'false'
      force_fetch_run:
        description: 'Kirim force_run=true saat trigger fetch (true/false)'
        required: false
        default: 'false'
      debug_login:
        description: 'DEBUG_LOGIN=true untuk screenshot/log login (true/false)'
        required: false
        default: 'false'

concurrency:
  group: refresh-bearer
  cancel-in-progress: false

jobs:
  refresh-bearer:
    runs-on: [self-hosted, linux, stockbit-bearer]
    env:
      ACCOUNT: ${{ inputs.account || 'primary' }}
      TRIGGER_FETCH_AFTER_REFRESH: ${{ inputs.trigger_fetch || 'false' }}
      FORCE_FETCH_RUN: ${{ inputs.force_fetch_run || 'false' }}
      DEBUG_LOGIN: ${{ inputs.debug_login || 'false' }}
      TARGET_GH_REPO: ${{ github.repository }}
      TARGET_GH_SECRET: BEARER_TOKEN
      FETCH_WORKFLOW_FILE: stockbit.yml
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      GH_TOKEN: ${{ secrets.GH_PAT }}
      PRIMARY_USERNAME: ${{ secrets.STOCKBIT_PRIMARY_USERNAME }}
      PRIMARY_PASSWORD: ${{ secrets.STOCKBIT_PRIMARY_PASSWORD }}
      SECONDARY_USERNAME: ${{ secrets.STOCKBIT_SECONDARY_USERNAME }}
      SECONDARY_PASSWORD: ${{ secrets.STOCKBIT_SECONDARY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pilih akun & profile
        shell: bash
        run: |
          set -euo pipefail
          case "${ACCOUNT}" in
            primary)
              USERNAME="${PRIMARY_USERNAME}"
              PASSWORD="${PRIMARY_PASSWORD}"
              ACCOUNT_LABEL="primary"
              CDP_URL="http://127.0.0.1:9223"
              ;;
            secondary)
              USERNAME="${SECONDARY_USERNAME}"
              PASSWORD="${SECONDARY_PASSWORD}"
              ACCOUNT_LABEL="secondary"
              CDP_URL="http://127.0.0.1:9225"
              ;;
            *)
              echo "ACCOUNT tidak dikenal: ${ACCOUNT}" >&2
              exit 1
              ;;
          esac

          if [ -z "${USERNAME}" ] || [ -z "${PASSWORD}" ]; then
            echo "Credential kosong untuk account=${ACCOUNT}" >&2
            exit 1
          fi

          PROFILE_ROOT="${HOME}/.stockbit-bearer/profiles"
          PROFILE_DIR="${PROFILE_ROOT}/${ACCOUNT_LABEL}"
          mkdir -p "${PROFILE_DIR}"

          echo "::add-mask::${USERNAME}"
          echo "::add-mask::${PASSWORD}"
          echo "STOCKBIT_USERNAME=${USERNAME}" >> "${GITHUB_ENV}"
          echo "STOCKBIT_PASSWORD=${PASSWORD}" >> "${GITHUB_ENV}"
          echo "STOCKBIT_ACCOUNT_LABEL=${ACCOUNT_LABEL}" >> "${GITHUB_ENV}"
          echo "STOCKBIT_PROFILE_DIR=${PROFILE_DIR}" >> "${GITHUB_ENV}"
          if [ -n "${CDP_URL}" ]; then
            echo "STOCKBIT_CDP_URL=${CDP_URL}" >> "${GITHUB_ENV}"
          fi

      - name: Install dependencies
        run: |
          pip install requests playwright
          python3 -m playwright install chromium

      - name: Validate gh auth
        run: gh auth status

      - name: Refresh bearer & push secret
        # PENTING #1: shell: bash biasa diam-diam menjalankan bash dengan
        # flag -e (errexit) bawaan GitHub Actions. Override shell invocation
        # di bawah supaya -e tidak aktif.
        #
        # PENTING #2 (bug POSIX yang lebih halus, ditemukan 21 Jul 2026):
        # `if run_refresh ...; then exit 0; fi` lalu `status=$?` SELALU
        # menghasilkan status=0, bukan exit code asli run_refresh -- ini
        # perilaku resmi POSIX: kalau branch "then" pada blok if TIDAK
        # dieksekusi (kondisinya gagal) dan tidak ada "else", exit status
        # keseluruhan blok if DIANGGAP 0, bukan exit code dari command yang
        # dites. Akibatnya `status` selalu 0, `-ne 10` selalu true, script
        # langsung exit 0 diam-diam -- fallback ke secondary/autorunner
        # jadi dead code, PERSIS seperti bug -e sebelumnya tapi beda akar
        # masalah. Fix: panggil run_refresh sebagai statement biasa dulu,
        # baru capture $? -- JANGAN jadikan run_refresh kondisi if.
        #
        # PENTING #3 (21 Jul 2026): supaya _launch_chrome_for_cdp() di
        # stockbit_auth_bearer_pusher.py bisa BENERAN buka Chrome sendiri
        # (non-headless, biar tidak kena anti-bot detection) kalau CDP
        # belum hidup, lalu tutup sendiri setelah selesai
        # (_stop_launched_chrome) -- tidak perlu lagi Chrome dibiarkan
        # terbuka manual terus-menerus.
        #
        # Pakai konvensi DISPLAY=:99 yang SAMA dengan buku-extractor/
        # sound-extractor (lihat buku-extractor/GANTI_AKUN_CHROME.md) --
        # display virtual permanen, bukan xvfb-run --auto-servernum (yang
        # bikin server baru sekali pakai tiap invocation, tidak konsisten
        # dengan kebiasaan mesin ini). Kalau Xvfb :99 kebetulan sudah aktif
        # untuk buku/sound-extractor, numpang; kalau belum, dinyalakan di
        # bawah. Install sekali di runner kalau xvfb belum ada:
        #   sudo apt-get install -y xvfb
        shell: bash --noprofile --norc -uo pipefail {0}
        run: |
          export DISPLAY=":99"
          if pgrep -f "Xvfb :99" >/dev/null 2>&1; then
            echo "Xvfb :99 sudah aktif, numpang (kemungkinan dipakai buku/sound-extractor)."
          else
            echo "Xvfb :99 belum jalan, menyalakan sekarang (mengikuti konvensi buku-extractor) ..."
            Xvfb :99 -screen 0 1280x1024x24 >/tmp/xvfb-refresh-bearer.log 2>&1 &
            disown
            sleep 2
          fi

          run_refresh() {
            local label="$1"
            local username="$2"
            local password="$3"
            local cdp_url="$4"
            local suppress_login_failure="${5:-false}"
            local profile_suffix="${6:-${label}}"
            local autorunner_profile="/home/fatih/Documents/Saham Indo/Python/stockbit-autorunner/logs/chrome_profile"

            if [ -z "${username}" ] || [ -z "${password}" ]; then
              echo "Credential kosong untuk fallback account=${label}" >&2
              return 10
            fi

            export STOCKBIT_USERNAME="${username}"
            export STOCKBIT_PASSWORD="${password}"
            export STOCKBIT_ACCOUNT_LABEL="${label}"
            if [ "${profile_suffix}" = "autorunner-playwright" ]; then
              export STOCKBIT_PROFILE_DIR="${autorunner_profile}"
            else
              export STOCKBIT_PROFILE_DIR="${HOME}/.stockbit-bearer/profiles/${profile_suffix}"
            fi
            export STOCKBIT_CDP_URL="${cdp_url}"
            export SUPPRESS_LOGIN_FAILURE_TELEGRAM="${suppress_login_failure}"

            mkdir -p "${STOCKBIT_PROFILE_DIR}"
            if [ -n "${cdp_url}" ]; then
              echo "== Refresh bearer account=${label} cdp=${cdp_url} =="
            else
              echo "== Refresh bearer account=${label} mode=persistent-playwright =="
            fi
            python3 push_bearer_to_github.py
          }

          if [ "${ACCOUNT}" = "primary" ]; then
            run_refresh primary "${PRIMARY_USERNAME}" "${PRIMARY_PASSWORD}" "http://127.0.0.1:9223" true
            status=$?
            if [ "${status}" -eq 0 ]; then
              exit 0
            fi
            if [ "${status}" -ne 10 ]; then
              exit "${status}"
            fi

            echo "::warning::Primary bearer refresh failed at login/token stage; fallback to secondary."
            run_refresh secondary "${SECONDARY_USERNAME}" "${SECONDARY_PASSWORD}" "http://127.0.0.1:9225" true
            status=$?
            if [ "${status}" -eq 0 ]; then
              exit 0
            fi
            if [ "${status}" -ne 10 ]; then
              exit "${status}"
            fi

            echo "::warning::Secondary CDP bearer refresh failed at login/token stage; fallback to secondary persistent Playwright."
            run_refresh secondary "${SECONDARY_USERNAME}" "${SECONDARY_PASSWORD}" "" false "autorunner-playwright"
            exit $?
          fi

          run_refresh secondary "${SECONDARY_USERNAME}" "${SECONDARY_PASSWORD}" "http://127.0.0.1:9225" true
          status=$?
          if [ "${status}" -eq 0 ]; then
            exit 0
          fi
          if [ "${status}" -ne 10 ]; then
            exit "${status}"
          fi

          echo "::warning::Secondary CDP bearer refresh failed at login/token stage; fallback to secondary persistent Playwright."
          run_refresh secondary "${SECONDARY_USERNAME}" "${SECONDARY_PASSWORD}" "" false "autorunner-playwright"

      - name: Upload debug logs
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: refresh-bearer-debug-${{ inputs.account || 'primary' }}
          path: |
            logs/
          if-no-files-found: ignore
